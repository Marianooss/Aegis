<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Aegis — Intro</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 100%; height: 100%; overflow: hidden; background: #000; }
.container {
  width: 100%; height: 100%;
  display: flex; align-items: center; justify-content: center;
  animation: fade-in 0.8s ease both;
}
img {
  width: 100%; height: 100%;
  object-fit: cover;
}
@keyframes fade-in {
  from { opacity: 0; }
  to { opacity: 1; }
}
</style>
</head>
<body>
  <div class="container">
    <img src="Aegis-logo.png" alt="Aegis — CI/CD for Regulated AI">
  </div>
</body>
</html>
